<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Audit Logs - SaaS Manager</title>
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="apple-touch-icon" href="../assets/img/pwa/icon-180.png" />
  <link rel="icon" href="../assets/img/pwa/icon-192.png" />
  <link rel="stylesheet" href="../assets/css/jr-admin.css" />
  <link rel="stylesheet" href="../assets/css/admin-compact-bar.css" />
  <link rel="stylesheet" href="../assets/css/admin-saas.css" />
  <script defer src="../assets/js/pwa.js"></script>
  <script defer src="../assets/js/adminCommon.js"></script>
  <script defer src="../assets/js/adminCompactBar.js"></script>
  <script defer src="../assets/js/adminAuditLogs.js"></script>
</head>
<body class="jr-admin admin-compact-page">
  <header class="admin-compactBar">
    <div class="admin-compactBarInner">
      <div class="admin-compactBarLead">
        <a class="admin-compactBarBtn admin-compactBack" href="admin-hub.html" aria-label="Volver">←</a>
        <h1 class="admin-compactBarTitle">Audit Logs</h1>
      </div>
      <div class="admin-compactBarActions">
        <button class="admin-compactBarBtn" type="button" data-admin-compact-toggle="logsMenu" onclick="AdminCompactBar.toggle('logsMenu', event)" aria-label="Opciones">⋮</button>
        <div id="logsMenu" class="admin-compactBarMenu">
          <div class="admin-compactBarMenuMeta">Sesion: <strong id="userName">Admin</strong></div>
          <a class="admin-compactBarMenuItem" href="admin-hub.html">Panel principal</a>
          <a class="admin-compactBarMenuItem" href="saas-dashboard.html">SaaS Dashboard</a>
          <a class="admin-compactBarMenuItem" href="product-plans.html">Plans</a>
          <a class="admin-compactBarMenuItem" href="subscriptions.html">Subscriptions</a>
          <a class="admin-compactBarMenuItem" href="payments.html">Payments</a>
          <a class="admin-compactBarMenuItem" href="platform-users.html">Platform Users</a>
          <button class="admin-compactBarMenuItem danger" type="button" onclick="AdminCompactBar.closeAll(); AdminCommon.logout();">Cerrar sesion</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <h2 class="section-title">Bitacora de auditoria</h2>
      <p class="section-subtitle">Vista compacta de actores, acciones y targets.</p>
      <div id="message" class="message"></div>

      <div class="toolbar">
        <div class="filters">
          <div class="form-group">
            <label for="filterCompany">Company</label>
            <input id="filterCompany" type="text" placeholder="UUID" />
          </div>
          <div class="form-group">
            <label for="filterAction">Action</label>
            <input id="filterAction" type="text" placeholder="subscription.create" />
          </div>
          <div class="form-group">
            <label for="filterTargetType">Target type</label>
            <input id="filterTargetType" type="text" placeholder="subscription" />
          </div>
          <div class="form-group">
            <label for="filterDateFrom">Desde</label>
            <input id="filterDateFrom" type="date" />
          </div>
          <div class="form-group">
            <label for="filterDateTo">Hasta</label>
            <input id="filterDateTo" type="date" />
          </div>
          <button id="filterBtn" class="btn btn-secondary" type="button">Filtrar</button>
        </div>
      </div>

      <div id="loading" class="loading" style="display:none;">Cargando logs...</div>
      <div id="tableWrap" class="table-shell"></div>
    </section>
  </main>
</body>
</html>
