<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Clientes - Appyra</title>
    <meta name="theme-color" content="#020617">
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="apple-touch-icon" href="../assets/img/pwa/icon-180.png">
    <link rel="icon" href="../assets/img/pwa/icon-192.png">
    <script defer src="../assets/js/pwa.js"></script>
    <script defer src="../assets/js/adminActionsDialog.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #ffffff;
            color: #1F2937;
        }

        .admin-layout {
            min-height: 100vh;
        }

        .sidebar {
            width: 248px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.96);
            color: #0f172a;
            padding: 24px 0;
            border-right: 1px solid #e2e8f0;
            box-shadow: 8px 0 22px rgba(15, 23, 42, 0.04);
            overflow-y: auto;
            z-index: 30;
            transition: transform .25s ease;
        }

        .sidebar-header {
            padding: 0 20px 20px 20px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 12px;
            text-align: center;
        }

        .sidebar-logo {
            margin-bottom: 10px;
        }

        .sidebar-logo img {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #eff6ff 0%, #eef2ff 100%);
            border: 1px solid #dbe4f0;
            padding: 8px;
            object-fit: contain;
        }

        .sidebar h2 {
            font-size: 1.06rem;
            font-weight: 900;
            letter-spacing: -0.3px;
            color: #0f172a;
        }

        .sidebar-nav {
            list-style: none;
            padding: 8px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 3px 0;
            padding: 11px 14px;
            color: #334155;
            text-decoration: none;
            border-radius: 14px;
            border: 1px solid transparent;
            font-weight: 700;
            transition: .2s ease;
        }

        .sidebar-nav a:hover {
            background: #f8fafc;
            border-color: #e2e8f0;
            transform: translateX(2px);
        }

        .sidebar-nav a.active {
            background: linear-gradient(135deg, #eff6ff 0%, #eef2ff 100%);
            border-color: #bfd5ff;
            color: #1d4ed8;
        }

        .sidebar-footer {
            padding: 14px 16px 0 16px;
            margin-top: 10px;
            border-top: 1px solid #e2e8f0;
        }

        .logout-btn {
            width: 100%;
            border: 1px solid #fecaca;
            background: #fff1f2;
            color: #b91c1c;
            border-radius: 10px;
            padding: 10px;
            font-weight: 800;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #ffe4e6;
            color: #991b1b;
        }

        .main {
            margin-left: 248px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: linear-gradient(135deg, #031026 0%, #0A6CFF 45%, #0B7C61 100%);
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.18);
            padding: 12px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .topbar h1 {
            font-size: 1.15rem;
            font-weight: 900;
            letter-spacing: -0.3px;
        }

        .topbar-user {
            font-size: .9rem;
            opacity: .95;
        }

        .menu-btn {
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.36);
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border-radius: 8px;
            padding: 8px 10px;
            font-weight: 800;
            cursor: pointer;
        }

        .content {
            width: min(100%, 1800px);
            margin: 0 auto;
            padding: 24px;
            padding-bottom: 96px;
        }

        .panel {
            background: #fff;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            padding: 20px;
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: 1.35rem;
            font-weight: 900;
            color: #062B63;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .list-controls {
            display: grid;
            grid-template-columns: 1fr 200px;
            gap: 10px;
            margin: 12px 0 10px;
        }

        .list-controls input,
        .list-controls select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 12px;
            outline: none;
            font-size: 0.95rem;
            background: #fff;
        }

        .list-controls input:focus,
        .list-controls select:focus {
            border-color: #0A6CFF;
            box-shadow: 0 0 0 3px rgba(10, 108, 255, 0.14);
        }

        .customers-list {
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            background: #fff;
            overflow: hidden;
        }

        .customer-item {
            border-bottom: 1px solid #E5E7EB;
        }

        .customer-item:last-child {
            border-bottom: none;
        }

        .customer-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 12px;
            cursor: pointer;
        }

        .customer-line:hover {
            background: #F8FAFC;
        }

        .customer-text {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            overflow: hidden;
        }

        .customer-name {
            font-weight: 900;
            color: #0F172A;
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 54%;
        }

        .customer-metaInline {
            flex: 1 1 auto;
            min-width: 0;
            font-size: 0.86rem;
            color: #64748B;
            font-weight: 800;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .customer-actions {
            position: relative;
            flex: 0 0 auto;
        }

        .icon-btn {
            border: 1px solid #E5E7EB;
            background: #fff;
            color: #0F172A;
            border-radius: 12px;
            width: 44px;
            height: 40px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
        }

        .icon-btn:hover {
            background: #F8FAFC;
            border-color: #CBD5E1;
        }

        .customer-details {
            display: none;
            padding: 12px;
            background: #fff;
        }

        .customer-item.open .customer-details {
            display: grid;
            gap: 10px;
            border-top: 1px dashed #E5E7EB;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .detail-box {
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 10px;
            background: #F8FAFC;
            min-width: 0;
        }

        .detail-k {
            font-size: 0.76rem;
            color: #64748B;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .detail-v {
            font-size: 0.92rem;
            font-weight: 900;
            color: #0F172A;
            word-break: break-word;
        }

        .pill {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            background: #F3F4F6;
            border: 1px solid #E5E7EB;
            color: #334155;
            font-weight: 700;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: .88rem;
            font-weight: 800;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #031026 0%, #0A6CFF 45%, #0B7C61 100%);
            color: #fff;
        }

        .btn-primary:hover { box-shadow: 0 10px 26px rgba(2, 6, 23, 0.28); }

        .btn-muted {
            background: #fff;
            color: #062B63;
            border: 1px solid #CBD5E1;
        }

        .btn-muted:hover { background: #F8FAFC; }

        .alert {
            background: #DBEAFE;
            border-left: 4px solid #3B82F6;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            color: #1E40AF;
            font-size: .92rem;
            font-weight: 600;
        }

        .msg {
            margin: 12px 0;
            padding: 12px;
            border-radius: 10px;
            display: none;
            font-weight: 700;
        }

        .msg.ok {
            display: block;
            background: #EFF6FF;
            border: 1px solid #A7F3D0;
            color: #065F46;
        }

        .msg.err {
            display: block;
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: #991B1B;
        }

        .table-wrap {
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            overflow: auto;
            background: #fff;
        }

        table {
            width: 100%;
            min-width: 980px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid #E5E7EB;
            text-align: left;
            font-size: 0.91rem;
            vertical-align: top;
        }

        th {
            background: #F8FAFC;
            color: #0F172A;
            font-weight: 900;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        td.actions {
            white-space: normal;
            text-align: right;
        }

        .hint {
            font-size: 0.79rem;
            color: #6B7280;
        }

        .pagination {
            margin-top: 14px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            background: #F8FAFC;
        }

        .pager-info {
            display: flex;
            justify-content: center;
        }

        .pager-btn {
            border: 1px solid #CBD5E1;
            background: #fff;
            color: #062B63;
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 0.82rem;
            font-weight: 900;
            cursor: pointer;
            line-height: 1;
        }

        .pager-btn:hover { background: #FFFFFF; box-shadow: 0 8px 18px rgba(15, 23, 42, 0.10); }
        .pager-btn:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }

        /* Clean UI: hide informational boxes/hints */
        .alert,
        .hint {
            display: none;
        }

        /* Floating action button (AppSheet-like) */
        .jr-fab {
            position: fixed;
            right: 14px;
            bottom: 14px;
            width: 54px;
            height: 54px;
            border-radius: 18px;
            border: 1px solid rgba(15, 23, 42, 0.12);
            background: #0F172A;
            color: #fff;
            font-size: 28px;
            font-weight: 900;
            line-height: 0;
            cursor: pointer;
            box-shadow: 0 14px 24px rgba(15, 23, 42, 0.18);
            /* Keep below dialogs/drawers so taps outside drawer work */
            z-index: 1000;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .jr-fab:hover { background: #111827; box-shadow: 0 18px 30px rgba(15, 23, 42, 0.22); }
        .jr-fab:active { transform: translateY(1px); }

        .license-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .license-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #E5E7EB;
            background: #fff;
            color: #0F172A;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.82rem;
            font-weight: 900;
        }

        .license-chip .muted {
            color: #64748B;
            font-weight: 900;
        }

        .actions-dropdown {
            position: relative;
            display: inline-block;
        }

        .actions-trigger {
            background: #FFFFFF;
            color: #0F172A;
            border: 1px solid #CDE3D8;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.84rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
            cursor: pointer;
        }

        .actions-trigger:hover {
            background: #F0F9F4;
            border-color: #99CCB5;
        }

        .actions-menu {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            min-width: 220px;
            background: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            box-shadow: 0 16px 30px rgba(15, 23, 42, 0.14);
            padding: 8px;
            display: none;
            z-index: 60;
        }

        .actions-menu.show { display: block; }

        .actions-menu-item {
            width: 100%;
            text-align: left;
            background: transparent;
            color: #0F172A;
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 0.84rem;
            font-weight: 700;
            cursor: pointer;
        }

        .actions-menu-item:hover {
            background: #F8FAFC;
            border-color: #E5E7EB;
        }

        .actions-menu-item.token { color: #0F172A; }
        .actions-menu-item.danger { color: #991B1B; }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 80;
            padding: 14px;
        }

        .modal.show { display: flex; }

        .modal-card {
            width: min(760px, 100%);
            max-height: calc(100vh - 32px);
            overflow: auto;
            background: #fff;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            box-shadow: 0 24px 50px rgba(2, 6, 23, 0.32);
            padding: 18px;
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }

        .modal-head h3 {
            color: #062B63;
            font-size: 1.1rem;
            font-weight: 900;
        }

        .close-btn {
            border: 1px solid #CBD5E1;
            background: #fff;
            color: #334155;
            border-radius: 10px;
            padding: 7px 10px;
            font-weight: 800;
            cursor: pointer;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 8px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        .field label {
            font-size: 0.84rem;
            font-weight: 800;
            color: #334155;
        }

        .field input {
            padding: 10px 11px;
            border: 1px solid #D1D5DB;
            border-radius: 10px;
            outline: none;
            font-size: 0.92rem;
        }

        .field input:focus {
            border-color: #0A6CFF;
            box-shadow: 0 0 0 3px rgba(10, 108, 255, 0.15);
        }

        .drawer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.45);
            z-index: 25;
        }

        @media (max-width: 1024px) {
            .content {
                padding: 16px;
                width: 100%;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .field.full {
                grid-column: auto;
            }
        }

        @media (max-width: 900px) {
            .pagination {
                grid-template-columns: auto 1fr auto;
                gap: 8px;
            }

            .drawer-overlay {
                display: block;
                opacity: 0;
                pointer-events: none;
                transition: opacity .2s ease;
                z-index: 1100;
            }

            body.drawer-open .drawer-overlay {
                opacity: 1;
                pointer-events: auto;
            }

            /* Ensure drawer stays above its overlay */
            .sidebar {
                z-index: 1101;
            }

            .main {
                margin-left: 0;
            }

            /* Mobile drawer behavior: hide sidebar until opened */
            .sidebar {
                width: min(300px, 88vw);
                transform: translateX(-102%);
                z-index: 1101;
            }

            body.drawer-open .sidebar {
                transform: translateX(0);
            }

            .menu-btn {
                display: inline-flex;
            }

            .topbar {
                padding: 10px 12px;
            }

            table thead { display: none; }

            table,
            tbody,
            tr,
            td {
                display: block;
                width: 100%;
                min-width: 0;
            }

            tr {
                border-bottom: 1px solid #E5E7EB;
                padding: 8px 0;
            }

            td {
                border-bottom: 1px dashed #E5E7EB;
                padding: 8px 4px;
                text-align: left !important;
            }

            td:last-child { border-bottom: none; }

            td::before {
                content: attr(data-label);
                display: block;
                font-size: 0.74rem;
                color: #6B7280;
                font-weight: 700;
                margin-bottom: 3px;
            }

            .actions-dropdown { width: 100%; }

            .actions-trigger {
                width: 100%;
                justify-content: space-between;
            }

            .actions-menu {
                left: 0;
                right: 0;
                min-width: 100%;
            }

            .pagination {
                flex-direction: column;
                align-items: stretch;
            }

            .pagination .btn {
                width: 100%;
            }

            .list-controls {
                grid-template-columns: 1fr;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        .customers-shell {
            background: #ffffff;
        }

        .customers-content {
            width: min(100%, 920px);
            padding-top: 8px;
        }

        .customers-header {
            position: sticky;
            top: 0;
            z-index: 18;
            padding: 2px 0 12px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(8px);
        }

        .customers-topline {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }

        .customers-titleWrap {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .customers-titleWrap h1 {
            font-size: 0.98rem;
            font-weight: 900;
            color: #0F172A;
            letter-spacing: -0.4px;
        }

        .nav-icon-btn,
        .toolbar-icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            background: #ffffff;
            color: #0F172A;
            font-size: 0.88rem;
            font-weight: 900;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: none;
        }

        .nav-icon-btn:hover,
        .toolbar-icon-btn:hover {
            background: #F8FAFC;
            border-color: rgba(148, 163, 184, 0.4);
        }

        .toolbar-icon-btn.is-active {
            background: #F1F5F9;
            color: #0F172A;
            border-color: rgba(148, 163, 184, 0.42);
        }

        .customers-searchRow {
            display: none;
            padding-top: 6px;
        }

        .customers-searchRow.is-visible {
            display: block;
        }

        .customers-searchRow input {
            width: 100%;
            padding: 9px 11px;
            border: 1px solid rgba(203, 213, 225, 0.92);
            border-radius: 10px;
            background: #ffffff;
            font-size: 0.85rem;
            outline: none;
            box-shadow: none;
        }

        .customers-searchRow input:focus {
            border-color: rgba(148, 163, 184, 0.46);
            box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.12);
        }

        .customers-listSurface {
            border: 1px solid rgba(226, 232, 240, 0.88);
            border-radius: 14px;
            background: #ffffff;
            box-shadow: none;
            overflow: hidden;
        }

        .customer-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 2px;
            padding: 2px 6px;
            border-bottom: 1px solid rgba(226, 232, 240, 0.92);
            align-items: center;
            background: #ffffff;
        }

        .customer-item:last-child {
            border-bottom: none;
        }

        .customer-mainBtn {
            border: none;
            background: transparent;
            text-align: left;
            padding: 7px 6px;
            border-radius: 10px;
            cursor: pointer;
            min-width: 0;
        }

        .customer-mainBtn:hover {
            background: #F8FAFC;
        }

        .customer-linePrimary,
        .customer-lineSecondary {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            flex-wrap: wrap;
        }

        .customer-lineSecondary {
            margin-top: 3px;
        }

        .customer-name {
            max-width: 100%;
            font-size: 0.86rem;
            font-weight: 900;
            color: #0F172A;
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .customer-phone {
            font-size: 0.76rem;
            font-weight: 800;
            color: #475569;
        }

        .license-statePill {
            display: inline-flex;
            align-items: center;
            min-height: 20px;
            padding: 0 7px;
            border-radius: 999px;
            font-size: 0.66rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .license-statePill.active {
            background: rgba(11, 124, 97, 0.12);
            color: #0B6B56;
        }

        .license-statePill.inactive {
            background: rgba(234, 88, 12, 0.12);
            color: #C2410C;
        }

        .license-statePill.none {
            background: rgba(148, 163, 184, 0.14);
            color: #475569;
        }

        .customer-idMeta {
            font-size: 0.68rem;
            font-weight: 800;

        .customer-actions {

        .slim-menuItem,

    <div class="modal" id="createCustomerModal" aria-hidden="true">

                <h3 id="createClientTitle">Crear cliente</h3>
                <button type="button" class="close-btn" onclick="closeCreateModal()">✕</button>
            </div>

            <form id="createForm">
                <div class="form-grid">
                    <div class="field full">
                        <label for="business_id">Business ID (opcional)</label>
                        <input id="business_id" name="business_id" placeholder="Ej: a1b2c3d4e5f6..." />
                    </div>

                    <div class="field full">
                        <label for="nombre_negocio">Nombre del negocio *</label>
                        <input id="nombre_negocio" name="nombre_negocio" placeholder="Ej: Colmado La Esquina" required />
                    </div>

                    <div class="field">
                        <label for="contacto_nombre">Nombre de contacto</label>
                        <input id="contacto_nombre" name="contacto_nombre" placeholder="Ej: Juan Pérez" />
                    </div>

                    <div class="field">
                        <label for="contacto_telefono">Teléfono *</label>
                        <input id="contacto_telefono" name="contacto_telefono" placeholder="Ej: 8290000000" required />
                    </div>

                    <div class="field">
                        <label for="contacto_email">Email</label>
                        <input id="contacto_email" name="contacto_email" placeholder="Ej: cliente@correo.com" />
                    </div>

                    <div class="field">
                        <label for="rol_negocio">Rol del negocio</label>
                        <input id="rol_negocio" name="rol_negocio" placeholder="Ej: Ferretería, Colmado, Restaurante" />
                    </div>
                </div>

                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:12px; flex-wrap:wrap;">
                    <button type="button" class="btn btn-muted" onclick="resetForm()">Limpiar</button>
                    <button type="submit" class="btn btn-primary">Crear cliente</button>
                </div>
            </form>
        </div>
    </div>

    <button class="jr-fab" type="button" onclick="openCreateModal()" aria-label="Agregar cliente">+</button>

    <script>
        const API_URL = (() => {
            const host = (window.location && window.location.hostname) ? String(window.location.hostname) : '';
            const origin = (window.location && typeof window.location.origin === 'string') ? window.location.origin : '';
            if (host === 'localhost' || host === '127.0.0.1') return 'http://127.0.0.1:3000';
            if (origin && origin !== 'null') return origin;
            return '';
        })();

        let sessionId = localStorage.getItem('sessionId');
        let currentPage = 1;
        const limit = 20;
        let lastCustomers = [];
        let currentQuickFilter = 'all';
        let isSearchVisible = false;

        window.addEventListener('load', () => {
            // Always start with the drawer closed.
            closeDrawer();

            if (!sessionId) {
                window.location.href = '/admin/login.html';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const urlSessionId = urlParams.get('sessionId');
            if (urlSessionId) {
                sessionId = urlSessionId;
                localStorage.setItem('sessionId', sessionId);
            }

            verifySession();

            bindDrawerAutoClose();

            const form = document.getElementById('createForm');
            form.addEventListener('submit', createCustomer);

            const modal = document.getElementById('createCustomerModal');
            modal.addEventListener('click', (event) => {
                if (event.target === modal) closeCreateModal();
            });

            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    closeCreateModal();
                    closeAllActionsMenus();
                    closeDrawer();
                }
            });

            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    renderCustomersList();
                });
            }

            loadCustomers(1);
        });

        // Ensure drawer doesn't stay open on back/forward cache restores.
        window.addEventListener('pageshow', () => closeDrawer());

        function toggleDrawer() {
            document.body.classList.toggle('drawer-open');
        }

        function closeDrawer() {
            document.body.classList.remove('drawer-open');
        }

        function bindDrawerAutoClose() {
            const sidebar = document.querySelector('.sidebar');
            if (!sidebar) return;

            const overlay = document.querySelector('.drawer-overlay');
            if (overlay) {
                overlay.addEventListener('pointerdown', (e) => {
                    if (e.target === overlay) closeDrawer();
                });
            }

            sidebar.addEventListener('click', (e) => {
                const a = e.target && e.target.closest ? e.target.closest('a') : null;
                if (!a) return;
                closeDrawer();
            });
        }

        function openCreateModal() {
            document.getElementById('createCustomerModal').classList.add('show');
        }

        function closeCreateModal() {
            document.getElementById('createCustomerModal').classList.remove('show');
        }

        function showMessage(type, text) {
            const el = document.getElementById('msg');
            el.className = 'msg ' + (type === 'ok' ? 'ok' : 'err');
            el.textContent = text;
        }

        function clearMessage() {
            const el = document.getElementById('msg');
            el.className = 'msg';
            el.textContent = '';
        }

        async function apiFetch(path, options = {}) {
            const headers = Object.assign({}, options.headers || {}, {
                'x-session-id': sessionId
            });
            return fetch(`${API_URL}${path}`, Object.assign({}, options, { headers }));
        }

        async function verifySession() {
            try {
                const response = await fetch(`${API_URL}/api/verify-session`, {
                    cache: 'no-store',
                    headers: { 'x-session-id': sessionId }
                });
                const data = await response.json().catch(() => ({}));

                if (data.success) {
                    const userName = document.getElementById('userName');
                    if (userName) userName.textContent = data.username || 'Admin';
                } else {
                    logout();
                }
            } catch (error) {
                console.warn('verifySession failed (transient):', error && error.message ? error.message : error);
            }
        }

        function resetForm() {
            document.getElementById('createForm').reset();
        }

        async function createCustomer(e) {
            e.preventDefault();
            clearMessage();

            const business_id = (document.getElementById('business_id').value || '').trim();
            const nombre_negocio = (document.getElementById('nombre_negocio').value || '').trim();
            const contacto_nombre = (document.getElementById('contacto_nombre').value || '').trim();
            const contacto_telefono = (document.getElementById('contacto_telefono').value || '').trim();
            const contacto_email = (document.getElementById('contacto_email').value || '').trim();
            const rol_negocio = (document.getElementById('rol_negocio').value || '').trim();

            if (!nombre_negocio) {
                showMessage('err', 'nombre_negocio es requerido');
                return;
            }

            if (!contacto_telefono) {
                showMessage('err', 'contacto_telefono es requerido');
                return;
            }

            try {
                const res = await apiFetch('/api/admin/customers', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({
                        business_id: business_id || null,
                        nombre_negocio,
                        contacto_nombre: contacto_nombre || null,
                        contacto_telefono,
                        contacto_email: contacto_email || null,
                        rol_negocio: rol_negocio || null
                    })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) {
                    showMessage('err', data?.message || `Error creando cliente (${res.status})`);
                    return;
                }

                showMessage('ok', '✅ Cliente creado correctamente');
                document.getElementById('createForm').reset();
                closeCreateModal();
                await loadCustomers(1);
            } catch (err) {
                showMessage('err', 'No se pudo conectar con el servidor');
            }
        }

        function formatDate(value) {
            if (!value) return '';
            try {
                const d = new Date(value);
                return d.toLocaleString();
            } catch {
                return String(value);
            }
        }

        async function loadCustomers(page) {
            currentPage = Math.max(1, Number(page || 1) || 1);
            const list = document.getElementById('customersList');
            list.innerHTML = '<div style="padding: 14px; color:#6B7280; font-weight:700;">Cargando...</div>';

            try {
                const res = await apiFetch(`/api/admin/customers?page=${encodeURIComponent(currentPage)}&limit=${encodeURIComponent(limit)}`);
                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) {
                    list.innerHTML = `<div style="padding: 14px; color:#991B1B; font-weight:800;">${escapeHtml(data?.message || 'Error cargando clientes')}</div>`;
                    return;
                }

                const customers = data.customers || [];
                const total = Number(data.total || 0);
                document.getElementById('pagerStatus').textContent = `Página ${data.page || currentPage}`;

                const hasPrev = currentPage > 1;
                const hasNext = (currentPage * limit) < total;
                document.getElementById('prevBtn').disabled = !hasPrev;
                document.getElementById('nextBtn').disabled = !hasNext;

                lastCustomers = customers;
                renderCustomersList();
            } catch (err) {
                list.innerHTML = '<div style="padding: 14px; color:#991B1B; font-weight:800;">No se pudo conectar con el servidor.</div>';
            }
        }

        function getFilterState() {
            const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
            const filter = String(currentQuickFilter || 'all');
            return { q, filter };
        }

        function matchesQuery(customer, q) {
            if (!q) return true;
            const parts = [
                customer?.nombre_negocio,
                customer?.contacto_nombre,
                customer?.contacto_telefono,
                customer?.contacto_email,
                customer?.business_id,
                customer?.rol_negocio,
                customer?.id
            ].map(v => String(v || '').toLowerCase());
            return parts.some(p => p.includes(q));
        }

        function matchesFilter(customer, filter) {
            const businessId = String(customer?.business_id || '').trim();
            const email = String(customer?.contacto_email || '').trim();

            if (filter === 'has_business_id') return Boolean(businessId);
            if (filter === 'no_business_id') return !businessId;
            if (filter === 'has_email') return Boolean(email);
            return true;
        }

        function renderCustomersList() {
            const list = document.getElementById('customersList');
            if (!list) return;

            const { q, filter } = getFilterState();

            const rows = (lastCustomers || [])
                .filter(c => matchesQuery(c, q))
                .filter(c => matchesFilter(c, filter));

            if (!rows.length) {
                list.innerHTML = '<div style="padding: 14px; color:#6B7280; font-weight:800;">No hay clientes para mostrar.</div>';
                return;
            }

            list.innerHTML = rows.map(c => {
                const negocio = c.nombre_negocio || '';
                const contacto = c.contacto_nombre || '';
                const tel = c.contacto_telefono || '';
                const customerId = c.id || '';
                const displayName = contacto || negocio || 'Cliente';
                const licenseState = getCustomerLicenseState(c);
                const phoneHtml = tel ? `<span class="customer-phone">${escapeHtml(tel)}</span>` : '';
                const businessId = String(c.business_id || '').trim();
                const menuId = `customer-menu-${customerId}`;

                return `
                    <div class="customer-item" data-customer-id="${escapeAttr(customerId)}">
                        <button class="customer-mainBtn" type="button" onclick="openCustomerDetail('${escapeAttr(customerId)}')" aria-label="Ver detalle del cliente">
                            <div class="customer-linePrimary">
                                <span class="customer-name">${escapeHtml(displayName)}</span>
                                ${phoneHtml}
                            </div>
                            <div class="customer-lineSecondary">
                                <span class="license-statePill ${licenseState.className}">${escapeHtml(licenseState.label)}</span>
                                <span class="customer-idMeta">ID: ${escapeHtml(customerId)}</span>
                            </div>
                        </button>
                        <div class="customer-actions">
                            <div class="slim-menuWrap">
                                <button class="icon-btn" type="button" onclick="openCustomerActionsDialog(event, '${escapeAttr(customerId)}')" aria-label="Acciones">&#8942;</button>
                                <div id="${escapeHtml(menuId)}" class="slim-menu slim-menu-row" onclick="event.stopPropagation()">
                                    <div class="slim-menuMeta">
                                        <strong>${escapeHtml(displayName)}</strong>
                                        ${escapeHtml(tel || businessId || 'Sin datos extra')}
                                    </div>
                                    <button class="slim-menuItem" type="button" onclick="openCustomerDetail('${escapeAttr(customerId)}')">Ver detalle</button>
                                    <button class="slim-menuItem" type="button" onclick="goToLicenses('${escapeAttr(customerId)}')">Crear licencia</button>
                                    <button class="slim-menuItem" type="button" onclick="setBusinessIdPrompt('${escapeAttr(customerId)}', '${escapeAttr(displayName)}', '${escapeAttr(businessId)}')">Asignar Business ID</button>
                                    <button class="slim-menuItem" type="button" onclick="goToSupportToken('${escapeAttr(businessId)}')" ${businessId ? '' : 'disabled'}>Generar token reset</button>
                                    <button class="slim-menuItemDanger" type="button" onclick="deleteCustomer('${escapeAttr(customerId)}', '${escapeAttr(displayName)}')">Eliminar cliente</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getCustomerLicenseState(customer) {
            const hasLicense = Boolean(customer?.has_license);
            const hasActiveLicense = Boolean(customer?.has_active_license);

            if (hasActiveLicense) {
                return { label: 'Licencia activa', className: 'active' };
            }

            if (hasLicense) {
                return { label: 'Licencia inactiva', className: 'inactive' };
            }

            return { label: 'Sin licencia', className: 'none' };
        }

        function openCustomerActionsDialog(event, customerId) {
            if (event) event.stopPropagation();
            const id = String(customerId || '').trim();
            if (!id) return;
            toggleActionsMenu(event, `customer-menu-${id}`);
        }

        function openCustomerDetail(customerId) {
            closeAllActionsMenus();
            if (window.JrAdminActionsDialog && typeof window.JrAdminActionsDialog.close === 'function') {
                window.JrAdminActionsDialog.close();
            }
            const id = String(customerId || '').trim();
            if (!id) return;
            window.location.href = `/admin/customer-detail.html?id=${encodeURIComponent(id)}`;
        }

        function toggleSearch() {
            isSearchVisible = !isSearchVisible;
            const row = document.getElementById('searchRow');
            const btn = document.getElementById('searchToggleBtn');
            if (row) row.classList.toggle('is-visible', isSearchVisible);
            if (btn) btn.classList.toggle('is-active', isSearchVisible);
            if (isSearchVisible) {
                document.getElementById('searchInput')?.focus();
            }
        }

        function applyQuickFilter(nextFilter, label) {
            currentQuickFilter = String(nextFilter || 'all');
            renderCustomersList();
        }

        function runScreenMenuAction(action) {
            closeAllActionsMenus();

            if (action === 'refresh') {
                loadCustomers(currentPage);
                return;
            }

            if (action === 'has_business_id') {
                applyQuickFilter('has_business_id', 'Con Business ID');
                return;
            }

            if (action === 'no_business_id') {
                applyQuickFilter('no_business_id', 'Sin Business ID');
                return;
            }

            if (action === 'has_email') {
                applyQuickFilter('has_email', 'Con email');
                return;
            }

            applyQuickFilter('all', 'Todos');
        }

        function goBack() {
            window.location.href = '/admin/admin-hub.html';
        }

        async function setBusinessIdPrompt(customerId, negocio, currentBusinessId) {
            closeAllActionsMenus();
            if (window.JrAdminActionsDialog && typeof window.JrAdminActionsDialog.close === 'function') {
                window.JrAdminActionsDialog.close();
            }
            const id = String(customerId || '').trim();
            if (!id) return;

            const current = String(currentBusinessId || '').trim();
            const name = String(negocio || '').trim();

            const next = prompt(
                `Asignar Business ID al cliente${name ? ' "' + name + '"' : ''}.\n\n` +
                (current ? `Actual: ${current}\n\n` : '') +
                'Pega aquí el Business ID del cliente:',
                current || ''
            );

            if (next === null) return;
            const business_id = String(next || '').trim();
            if (!business_id) {
                showMessage('err', 'business_id es requerido');
                return;
            }

            const force = Boolean(current && current !== business_id);
            if (force) {
                const ok = confirm('Este cliente ya tenía business_id distinto. ¿Reemplazarlo?');
                if (!ok) return;
            }

            try {
                const res = await apiFetch(`/api/admin/customers/${encodeURIComponent(id)}/business_id`, {
                    method: 'PUT',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ business_id, force })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) {
                    showMessage('err', data?.message || `Error asignando business_id (${res.status})`);
                    return;
                }

                showMessage('ok', '✅ Business ID actualizado');
                await loadCustomers(currentPage);
            } catch (e) {
                showMessage('err', 'No se pudo conectar con el servidor');
            }
        }

        async function deleteCustomer(customerId, negocio) {
            closeAllActionsMenus();
            if (window.JrAdminActionsDialog && typeof window.JrAdminActionsDialog.close === 'function') {
                window.JrAdminActionsDialog.close();
            }
            const id = String(customerId || '').trim();
            if (!id) return;

            const name = String(negocio || '').trim();
            const msg = `¿Eliminar el cliente${name ? ' "' + name + '"' : ''}?\n\nEsto eliminará también sus licencias y activaciones.`;
            const ok = window.confirm(msg);
            if (!ok) return;

            clearMessage();

            try {
                const res = await apiFetch(`/api/admin/customers/${encodeURIComponent(id)}`, {
                    method: 'DELETE'
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok || !data.ok) {
                    showMessage('err', data?.message || `Error eliminando cliente (${res.status})`);
                    return;
                }

                const count = Number(data.deletedLicensesCount || 0);
                showMessage('ok', `✅ Cliente eliminado. Licencias eliminadas: ${count}`);
                await loadCustomers(currentPage);
            } catch (e) {
                showMessage('err', 'No se pudo conectar con el servidor');
            }
        }

        function prevPage() {
            if (currentPage <= 1) return;
            loadCustomers(currentPage - 1);
        }

        function nextPage() {
            loadCustomers(currentPage + 1);
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function escapeAttr(value) {
            return String(value || '').replace(/'/g, "\\'");
        }

        function closeAllActionsMenus(exceptId) {
            const openMenus = document.querySelectorAll('.slim-menu.is-open');
            openMenus.forEach((menu) => {
                if (!exceptId || menu.id !== exceptId) {
                    menu.classList.remove('is-open');
                }
            });
        }

        function toggleActionsMenu(event, menuId) {
            if (event) event.stopPropagation();
            const id = String(menuId || '').trim();
            if (!id) return;

            const menu = document.getElementById(id);
            if (!menu) return;

            const isOpen = menu.classList.contains('is-open');
            closeAllActionsMenus();
            if (!isOpen) menu.classList.add('is-open');
        }

        document.addEventListener('click', () => {
            closeAllActionsMenus();
        });

        function goToLicenses(customerId) {
            closeAllActionsMenus();
            if (window.JrAdminActionsDialog && typeof window.JrAdminActionsDialog.close === 'function') {
                window.JrAdminActionsDialog.close();
            }
            const id = String(customerId || '').trim();
            if (!id) return;
            window.location.href = `/admin/licenses.html?customer_id=${encodeURIComponent(id)}`;
        }

        function goToSupportToken(businessId) {
            closeAllActionsMenus();
            if (window.JrAdminActionsDialog && typeof window.JrAdminActionsDialog.close === 'function') {
                window.JrAdminActionsDialog.close();
            }
            const id = String(businessId || '').trim();
            if (!id) {
                showMessage('err', 'Este cliente no tiene business_id. Asígnalo primero.');
                return;
            }

            const target = `/admin/license-config.html?support_business_id=${encodeURIComponent(id)}&support_username=admin&autogen=1`;
            window.location.href = target;
        }

        async function logout() {
            try {
                await fetch(`${API_URL}/api/logout`, {
                    method: 'POST',
                    headers: {
                        'x-session-id': sessionId,
                        'Content-Type': 'application/json'
                    }
                });
            } catch (e) {}

            localStorage.removeItem('sessionId');
            window.location.href = '/';
        }
    </script>
</body>
</html>
