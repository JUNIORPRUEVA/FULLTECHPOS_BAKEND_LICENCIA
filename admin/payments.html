<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Payments - SaaS Manager</title>
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="apple-touch-icon" href="../assets/img/pwa/icon-180.png" />
  <link rel="icon" href="../assets/img/pwa/icon-192.png" />
  <link rel="stylesheet" href="../assets/css/admin-unified.css" />
  <link rel="stylesheet" href="../assets/css/admin-saas.css" />
  <script defer src="../assets/js/pwa.js"></script>
  <script src="../assets/js/adminCommon.js"></script>
  <script defer src="../assets/js/adminPayments.js"></script>
</head>
<body>
  <div class="admin-layout">
  <div id="adminSidebarContainer"></div>
  <div class="admin-main">
  <header class="admin-topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle-btn" type="button" onclick="AdminCommon.toggleSidebar()" aria-label="Abrir menu">&#9776;</button>
      <span class="topbar-title">Pagos</span>
    </div>
    <div class="topbar-right topbar-user">&#128100; <span id="userName">Admin</span></div>
  </header>
  <div class="admin-content">
  <main class="container" style="padding:0;max-width:100%;">
    <section class="section">
      <h2 class="section-title">Pagos de suscripciones</h2>
      <p class="section-subtitle">Registra pagos manuales y valida extension visual de suscripcion.</p>
      <div id="message" class="message"></div>

      <div class="toolbar">
        <div class="filters">
          <div class="form-group">
            <label for="filterCompany">Company</label>
            <input id="filterCompany" type="text" placeholder="UUID opcional" />
          </div>
          <div class="form-group">
            <label for="filterSubscription">Subscription</label>
            <input id="filterSubscription" type="text" placeholder="UUID opcional" />
          </div>
          <div class="form-group">
            <label for="filterStatus">Estado</label>
            <select id="filterStatus">
              <option value="">Todos</option>
              <option value="pending">pending</option>
              <option value="paid">paid</option>
              <option value="failed">failed</option>
              <option value="refunded">refunded</option>
              <option value="cancelled">cancelled</option>
            </select>
          </div>
          <button id="filterBtn" class="btn btn-secondary" type="button">Filtrar</button>
        </div>
        <button id="newPaymentBtn" class="btn btn-primary" type="button">+ Registrar pago</button>
      </div>

      <div id="loading" class="loading" style="display:none;">Cargando pagos...</div>
      <div id="tableWrap" class="table-shell"></div>
    </section>
  </main>

  <div id="paymentModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="paymentModal"></div>
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h3>Registrar pago manual</h3>
          <p>Si status=paid el backend puede extender la suscripcion automaticamente.</p>
        </div>
        <button class="btn btn-secondary" type="button" data-close-modal="paymentModal">Cerrar</button>
      </div>
      <form id="paymentForm">
        <div class="modal-grid">
          <div class="form-group span-2">
            <label for="paymentSubscriptionId">Subscription ID *</label>
            <input id="paymentSubscriptionId" type="text" required />
          </div>
          <div class="form-group">
            <label for="paymentAmount">Monto *</label>
            <input id="paymentAmount" type="number" min="0" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="paymentStatus">Status</label>
            <select id="paymentStatus">
              <option value="pending">pending</option>
              <option value="paid" selected>paid</option>
              <option value="failed">failed</option>
              <option value="refunded">refunded</option>
              <option value="cancelled">cancelled</option>
            </select>
          </div>
          <div class="form-group">
            <label for="paymentMethod">Metodo</label>
            <select id="paymentMethod">
              <option value="manual" selected>manual</option>
              <option value="cash">cash</option>
              <option value="transfer">transfer</option>
              <option value="card">card</option>
              <option value="paypal">paypal</option>
              <option value="other">other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="paymentCurrency">Moneda</label>
            <input id="paymentCurrency" type="text" maxlength="10" value="DOP" />
          </div>
          <div class="form-group">
            <label for="paymentReference">Referencia</label>
            <input id="paymentReference" type="text" maxlength="160" />
          </div>
          <div class="form-group">
            <label for="paymentCompanyId">Company ID</label>
            <input id="paymentCompanyId" type="text" />
          </div>
          <div class="form-group">
            <label for="paymentLicenseId">License ID (opcional)</label>
            <input id="paymentLicenseId" type="text" />
          </div>
          <div class="form-group">
            <label for="paymentPaidAt">Fecha de pago</label>
            <input id="paymentPaidAt" type="datetime-local" />
          </div>
          <div class="form-group span-2">
            <label for="paymentNotes">Notas</label>
            <textarea id="paymentNotes"></textarea>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" type="button" data-close-modal="paymentModal">Cancelar</button>
          <button class="btn btn-primary" type="submit">Guardar pago</button>
        </div>
      </form>
    </div>
  </div>
  <script>AdminCommon.initSidebarLayout('payments');</script>
</div></div></div>
</body>
</html>
