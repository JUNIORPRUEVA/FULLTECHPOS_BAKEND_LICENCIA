<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020617">
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="apple-touch-icon" href="../assets/img/pwa/icon-180.png">
    <link rel="icon" href="../assets/img/pwa/icon-192.png">
    <script defer src="../assets/js/pwa.js"></script>
    <link rel="stylesheet" href="../assets/css/jr-admin.css">
    <title>Login - Panel Administrativo FullPOS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(10, 108, 255, 0.22), transparent 30%),
                radial-gradient(circle at bottom right, rgba(11, 124, 97, 0.18), transparent 24%),
                linear-gradient(135deg, #07111F 0%, #0B1B33 42%, #12325D 100%);
        }

        .login-container {
            position: relative;
            width: 100%;
            max-width: 430px;
            padding: 34px 32px 28px;
            border-radius: 24px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.96) 0%, rgba(19, 33, 58, 0.98) 100%);
            box-shadow:
                0 28px 70px rgba(2, 6, 23, 0.46),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            animation: slideInUp 0.6s ease;
            overflow: hidden;
        }

        .login-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.08), transparent 28%),
                radial-gradient(circle at top right, rgba(10, 108, 255, 0.18), transparent 26%);
            pointer-events: none;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header,
        .form-group,
        .error-message,
        .success-message,
        .loading,
        .back-link,
        .demo-info {
            position: relative;
            z-index: 1;
        }

        .login-header {
            margin-bottom: 28px;
            text-align: left;
        }

        .login-kicker {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0 12px;
            margin-bottom: 16px;
            border-radius: 999px;
            border: 1px solid rgba(96, 165, 250, 0.24);
            background: rgba(15, 23, 42, 0.42);
            color: #B6C6E3;
            font-size: 0.73rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .login-header h1 {
            font-size: 1.85rem;
            color: #F8FAFC;
            margin-bottom: 8px;
            font-weight: 650;
            letter-spacing: -0.04em;
        }

        .login-header p {
            max-width: 280px;
            color: #A8B6CC;
            font-size: 0.95rem;
            line-height: 1.55;
            letter-spacing: 0.01em;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #D8E1EF;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            min-height: 48px;
            padding: 11px 14px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            background-color: #F8FAFC;
            color: #0F172A;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #94A3B8;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: rgba(10, 108, 255, 0.72);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(10, 108, 255, 0.14);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 16px 0 8px;
        }

        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(226, 232, 240, 0.38);
            border-top-color: #60A5FA;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        button {
            width: 100%;
            min-height: 50px;
            padding: 0 18px;
            margin-top: 6px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #0A6CFF 0%, #0954D8 100%);
            color: #FFFFFF;
            font-size: 0.96rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
            box-shadow: 0 16px 32px rgba(10, 108, 255, 0.28);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 36px rgba(10, 108, 255, 0.34);
            filter: brightness(1.03);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 10px 24px rgba(10, 108, 255, 0.24);
        }

        button:disabled {
            opacity: 0.72;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            filter: none;
        }

        .error-message {
            display: none;
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            background-color: rgba(127, 29, 29, 0.24);
            border: 1px solid rgba(248, 113, 113, 0.28);
            color: #FECACA;
            font-size: 0.86rem;
            animation: slideInUp 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            display: none;
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            background-color: rgba(6, 95, 70, 0.24);
            border: 1px solid rgba(52, 211, 153, 0.24);
            color: #A7F3D0;
            font-size: 0.86rem;
            animation: slideInUp 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 46px;
            padding: 0 14px;
            margin-top: 12px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.3);
            color: #E2E8F0;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: background-color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
        }

        .back-link:hover {
            background: rgba(30, 41, 59, 0.68);
            border-color: rgba(96, 165, 250, 0.28);
            transform: translateY(-1px);
        }

        .demo-info {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(15, 23, 42, 0.26);
            color: #A8B6CC;
            font-size: 0.84rem;
            line-height: 1.5;
        }

        .demo-info strong {
            display: block;
            margin-bottom: 4px;
            color: #E2E8F0;
            font-weight: 600;
        }

        .demo-info p {
            margin: 0;
        }

        button:focus-visible,
        input:focus-visible,
        .back-link:focus-visible {
            outline: 2px solid rgba(96, 165, 250, 0.42);
            outline-offset: 2px;
        }

        body.jr-admin.jr-admin-login {
            background:
                radial-gradient(circle at top left, rgba(10, 108, 255, 0.22), transparent 30%),
                radial-gradient(circle at bottom right, rgba(11, 124, 97, 0.18), transparent 24%),
                linear-gradient(135deg, #07111F 0%, #0B1B33 42%, #12325D 100%) !important;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            .login-container {
                padding: 28px 22px 22px;
                border-radius: 20px;
            }

            .login-header h1 {
                font-size: 1.65rem;
            }
        }
    </style>
</head>
<body class="jr-admin jr-admin-login">
    <div class="login-container">
        <div class="login-header">
            <span class="login-kicker">FullPOS Admin</span>
            <h1>Iniciar sesión</h1>
            <p>Accede al sistema para continuar con la gestión administrativa.</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Ingresa tu usuario"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Ingresa tu contraseña"
                    required
                    autocomplete="current-password"
                >
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <button type="submit" id="loginBtn">Acceder</button>
        </form>

        <a id="backToSite" class="back-link" href="#">Volver a la página principal</a>

        <div class="demo-info">
            <strong>Acceso restringido</strong>
            <p>Este panel es solo para uso administrativo.</p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        const loginBtn = document.getElementById('loginBtn');
        const backToSite = document.getElementById('backToSite');

        const urlParams = new URLSearchParams(window.location.search);
        const returnTo = urlParams.get('returnTo');

        if (backToSite) {
            const fallbackLanding = '/';
            const backHref = returnTo || ((document.referrer && document.referrer.startsWith('http')) ? document.referrer : fallbackLanding);
            backToSite.href = backHref;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            loading.style.display = 'block';
            loginBtn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('sessionId', data.sessionId);
                    if (returnTo) {
                        localStorage.setItem('returnTo', returnTo);
                    }

                    successMessage.textContent = 'Acceso concedido. Redirigiendo...';
                    successMessage.classList.add('show');

                    setTimeout(() => {
                        const rt = returnTo ? `&returnTo=${encodeURIComponent(returnTo)}` : '';
                        window.location.href = '/admin/customers.html?sessionId=' + data.sessionId + rt;
                    }, 1000);
                } else {
                    errorMessage.textContent = data.message;
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                errorMessage.textContent = 'Error de conexión: ' + error.message;
                errorMessage.classList.add('show');
            } finally {
                loading.style.display = 'none';
                loginBtn.disabled = false;
            }
        });

        window.addEventListener('load', () => {
            const sessionId = localStorage.getItem('sessionId');
            if (sessionId) {
                fetch(`/api/verify-session?sessionId=${encodeURIComponent(sessionId)}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            window.location.href = '/admin/customers.html';
                        }
                    })
                    .catch(() => {
                        localStorage.removeItem('sessionId');
                    });
            }
        });
    </script>
</body>
</html>
