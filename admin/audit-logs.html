<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Audit Logs - SaaS Manager</title>
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="apple-touch-icon" href="../assets/img/pwa/icon-180.png" />
  <link rel="icon" href="../assets/img/pwa/icon-192.png" />
  <link rel="stylesheet" href="../assets/css/admin-unified.css" />
  <link rel="stylesheet" href="../assets/css/admin-saas.css" />
  <script defer src="../assets/js/pwa.js"></script>
  <script src="../assets/js/adminCommon.js"></script>
  <script defer src="../assets/js/adminAuditLogs.js"></script>
</head>
<body>
  <div class="admin-layout">
  <div id="adminSidebarContainer"></div>
  <div class="admin-main">
  <header class="admin-topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle-btn" type="button" onclick="AdminCommon.toggleSidebar()" aria-label="Abrir menu">&#9776;</button>
      <span class="topbar-title">Audit Logs</span>
    </div>
    <div class="topbar-right topbar-user">&#128100; <span id="userName">Admin</span></div>
  </header>
  <div class="admin-content">
  <main class="container" style="padding:0;max-width:100%;">
    <section class="section">
      <h2 class="section-title">Bitacora de auditoria</h2>
      <p class="section-subtitle">Vista compacta de actores, acciones y targets.</p>
      <div id="message" class="message"></div>

      <div class="toolbar">
        <div class="filters">
          <div class="form-group">
            <label for="filterCompany">Company</label>
            <input id="filterCompany" type="text" placeholder="UUID" />
          </div>
          <div class="form-group">
            <label for="filterAction">Action</label>
            <input id="filterAction" type="text" placeholder="subscription.create" />
          </div>
          <div class="form-group">
            <label for="filterTargetType">Target type</label>
            <input id="filterTargetType" type="text" placeholder="subscription" />
          </div>
          <div class="form-group">
            <label for="filterDateFrom">Desde</label>
            <input id="filterDateFrom" type="date" />
          </div>
          <div class="form-group">
            <label for="filterDateTo">Hasta</label>
            <input id="filterDateTo" type="date" />
          </div>
          <button id="filterBtn" class="btn btn-secondary" type="button">Filtrar</button>
        </div>
      </div>

      <div id="loading" class="loading" style="display:none;">Cargando logs...</div>
      <div id="tableWrap" class="table-shell"></div>
    </section>
  </main>
  <script>AdminCommon.initSidebarLayout('audit');</script>
</div></div></div>
</body>
</html>
